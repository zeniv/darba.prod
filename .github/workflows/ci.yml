name: CI

on:
  push:
    branches: [main, dev, test]
  pull_request:
    branches: [main, dev]

jobs:
  # =============================================
  # Frontend (Next.js)
  # =============================================
  frontend:
    name: Frontend — Lint & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: front

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: front/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
        env:
          NODE_ENV: production

  # =============================================
  # Backend — NestJS API
  # =============================================
  api:
    name: API — Lint, Test & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: back/api

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: back/api/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Unit tests
        run: npm run test

      - name: Build
        run: npm run build

  # =============================================
  # AI Worker — Python
  # =============================================
  ai-worker:
    name: AI Worker — Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: back/ai-worker

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint (ruff)
        run: pip install ruff && ruff check app/

  # =============================================
  # Docker Build (только при push в main/dev/test)
  # =============================================
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [frontend, api, ai-worker]
    if: github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./front
          push: false
          tags: darba/frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build API image
        uses: docker/build-push-action@v5
        with:
          context: ./back/api
          push: false
          tags: darba/api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build AI Worker image
        uses: docker/build-push-action@v5
        with:
          context: ./back/ai-worker
          push: false
          tags: darba/ai-worker:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
