name: Deploy

on:
  push:
    branches: [dev]
  pull_request:
    branches: [main]
    types: [closed]

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event.pull_request.merged == true

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /home/zzzeniv/darba

            # Pull the branch that triggered the deploy
            if [ "${{ github.event_name }}" = "pull_request" ]; then
              git pull origin main
            else
              git pull origin dev
            fi

            # Rebuild and restart services
            docker compose up -d --build --remove-orphans
            docker image prune -f

            # Verify API health
            sleep 10
            if docker compose exec -T api wget -qO- http://localhost:8000/api/health > /dev/null 2>&1; then
              echo "Deploy OK: API healthy ($(date))"
            else
              echo "WARNING: API health check failed ($(date))"
            fi
