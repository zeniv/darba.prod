name: Deploy

on:
  push:
    branches: [main]

env:
  REGISTRY: gcr.io
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}

jobs:
  deploy:
    name: Deploy to ${{ github.ref_name }}
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name }}

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for GCR
        run: gcloud auth configure-docker

      - name: Build & Push images
        run: |
          TAG=${{ github.sha }}
          ENV=${{ github.ref_name }}

          # Frontend
          docker build -t $REGISTRY/$PROJECT_ID/darba-frontend:$TAG ./front
          docker push $REGISTRY/$PROJECT_ID/darba-frontend:$TAG

          # API
          docker build -t $REGISTRY/$PROJECT_ID/darba-api:$TAG ./back/api
          docker push $REGISTRY/$PROJECT_ID/darba-api:$TAG

          # AI Worker
          docker build -t $REGISTRY/$PROJECT_ID/darba-ai-worker:$TAG ./back/ai-worker
          docker push $REGISTRY/$PROJECT_ID/darba-ai-worker:$TAG

      - name: Run DB Migrations
        run: |
          # Запуск Prisma migrate в CI-контейнере
          docker run --rm \
            -e DATABASE_URL="${{ secrets.DATABASE_URL }}" \
            $REGISTRY/$PROJECT_ID/darba-api:${{ github.sha }} \
            npx prisma migrate deploy

      - name: Deploy to Cloud Run (prod)
        if: github.ref_name == 'main'
        run: |
          TAG=${{ github.sha }}
          gcloud run deploy darba-api \
            --image $REGISTRY/$PROJECT_ID/darba-api:$TAG \
            --region europe-west1 \
            --platform managed \
            --set-secrets="DATABASE_URL=darba-db-url:latest,REDIS_URL=darba-redis-url:latest"

      - name: Run Security Scan (test only)
        if: github.ref_name == 'test'
        run: |
          # OWASP ZAP baseline scan
          docker run --rm owasp/zap2docker-stable zap-baseline.py \
            -t ${{ secrets.TEST_APP_URL }} \
            -r zap-report.html || true

      - name: Run Load Test (test only)
        if: github.ref_name == 'test'
        run: |
          # k6 нагрузочный тест
          docker run --rm -i grafana/k6 run - <<'EOF'
          import http from 'k6/http';
          import { check } from 'k6';
          export const options = { vus: 50, duration: '30s' };
          export default function () {
            const res = http.get('${{ secrets.TEST_APP_URL }}/health');
            check(res, { 'status is 200': (r) => r.status === 200 });
          }
          EOF
