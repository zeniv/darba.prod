name: Deploy

on:
  push:
    branches: [dev]
  pull_request:
    branches: [main]
    types: [closed]

jobs:
  deploy:
    name: Deploy to ${{ github.event_name == 'pull_request' && 'main' || github.ref_name }}
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event.pull_request.merged == true
    environment: ${{ github.event_name == 'pull_request' && 'main' || github.ref_name }}

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /home/zzzeniv/darba
            git pull origin dev
            docker compose -p darba up -d --build --remove-orphans
            docker image prune -f
            echo "Deploy complete: $(date)"
