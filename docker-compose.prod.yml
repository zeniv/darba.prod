version: '3.9'

# Override для продакшн (resource limits, no debug ports, health checks)

services:
  nginx:
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infra/nginx/conf.d:/etc/nginx/conf.d:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro  # SSL сертификаты
    restart: always

  frontend:
    environment:
      - NODE_ENV=production
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
    restart: always

  api:
    environment:
      - NODE_ENV=production
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G
    restart: always

  ai-worker:
    command: celery -A app.celery_app worker --loglevel=warning --concurrency=4
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 4G
    restart: always

  postgres:
    # В prod порты закрыты (нет external access)
    ports: []
    deploy:
      resources:
        limits:
          memory: 2G
    restart: always

  redis:
    ports: []
    deploy:
      resources:
        limits:
          memory: 512M
    restart: always

  keycloak:
    command: start --optimized
    environment:
      - KC_PROXY=edge
      - KC_HOSTNAME=${APP_DOMAIN:-darba.pro}
    ports: []  # Через nginx
    deploy:
      resources:
        limits:
          memory: 1G
    restart: always
