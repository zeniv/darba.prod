# Override для локальной разработки (hot reload, debug ports, volumes)

services:
  nginx:
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infra/nginx/darba-local.conf:/etc/nginx/conf.d/darba.conf:ro
    # В dev не нужен HTTPS, подменяем conf.d целиком на local-конфиг

  frontend:
    build:
      target: development
    volumes:
      - ./front:/app
      - /app/node_modules
      - /app/.next
    environment:
      - NODE_ENV=local
    command: npm run dev
    ports:
      - "3000:3000"

  api:
    build:
      target: development
    volumes:
      - ./back/api:/app
      - /app/node_modules
    environment:
      - NODE_ENV=local
    command: sh -c "npx prisma migrate deploy && npx prisma generate && npm run start:dev"
    ports:
      - "8000:8000"
      - "9229:9229"  # Node.js debug port

  ai-worker:
    volumes:
      - ./back/ai-worker:/app
    environment:
      - PYTHONUNBUFFERED=1
    command: watchmedo auto-restart --directory=/app --pattern=*.py --recursive -- celery -A app.celery_app worker --loglevel=info
    ports: []  # Нет внешнего порта

  postgres:
    ports:
      - "5432:5432"  # Открываем для локального подключения

  redis:
    ports:
      - "6379:6379"  # Открываем для локального подключения

  keycloak:
    ports:
      - "8080:8080"
